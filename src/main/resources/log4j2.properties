appender.console.type=Console
appender.console.name=console
appender.console.layout.type=PatternLayout
appender.console.layout.pattern=%-6p%d{dd.MM.yyyy HH:mm:ss} %m at %c:%L%n
appender.file.type=File
appender.file.name=file
appender.file.fileName=target/logs/logging.log
appender.file.layout.type=PatternLayout
appender.file.layout.pattern=%-6p%d{dd.MM.yyyy HH:mm:ss} %m at %c:%L%n
appender.file.filter.threshold.type=ThresholdFilter
appender.file.filter.threshold.level=info
rootLogger=debug, console, file